# Development overrides — mounts monorepo root for hot-reload
# Run using: docker compose up -d --build

services:
  api:
    build:
      context: .
      dockerfile: templates/api/Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/templates/api/node_modules

  admin:
    build:
      context: .
      dockerfile: templates/admin/Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3002
    volumes:
      - .:/app
      - /app/node_modules
      - /app/templates/admin/node_modules
      - /app/templates/admin/.next

  client:
    build:
      context: .
      dockerfile: templates/client/Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 3003
    volumes:
      - .:/app
      - /app/node_modules
      - /app/templates/client/node_modules
      - /app/templates/client/.next
