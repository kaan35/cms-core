# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  # ─── Infrastructure (Production) ────────────────────────────────────────────
  mongo:
    image: mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-cms_prod}
    networks:
      - cms_network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_ROOT_USERNAME}", "-p", "${MONGO_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - cms_network
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - cms_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: templates/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    env_file:
      - .env.production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network

  admin:
    build:
      context: .
      dockerfile: templates/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3002}:${ADMIN_PORT:-3002}"
    env_file:
      - .env.production
    depends_on:
      - api
    networks:
      - cms_network

  client:
    build:
      context: .
      dockerfile: templates/client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3003}:${CLIENT_PORT:-3003}"
    env_file:
      - .env.production
    depends_on:
      - api
    networks:
      - cms_network

networks:
  cms_network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  minio_data:
